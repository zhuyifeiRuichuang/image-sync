name: 🔄 容器镜像同步请求
description: 提交完整的容器镜像地址，自动同步到已配置的镜像仓库
labels: ["image-sync"]
body:
  - type: input
    id: image-full-ref
    attributes:
      label: 镜像完整地址
      description: |-
        请填写完整的镜像地址，格式为：`仓库地址/镜像路径:Tag`

        示例：
        - Docker Hub 官方镜像：`docker.io/library/mysql:8.4.10`
        - Docker Hub 用户镜像：`docker.io/nginxinc/nginx:latest`
        - Quay：`quay.io/prometheus/node-exporter:latest`
        - GHCR：`ghcr.io/owner/repo:tag`
        - 腾讯云：`ccr.ccs.tencentyun.com/namespace/mysql:8.4.10`

        ⚠️ 必须包含完整的仓库地址，不能只写 `apache/seatunnel:2.3.13`
      placeholder: docker.io/apache/seatunnel:2.3.13
    validations:
      required: true
