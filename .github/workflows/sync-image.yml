name: 🔄 容器镜像同步

on:
  issues:
    # 仅通过 labeled 事件触发。
    # Issue 模板会自动附加 image-sync 标签，因此创建 Issue 时会触发 labeled 事件。
    # 后续手动添加 image-sync 标签也能触发。
    # 避免 opened + labeled 同时触发导致重复运行。
    types: [labeled]

# 同一 Issue 的并发运行自动取消，避免重复触发
concurrency:
  group: ${{ github.workflow }}-${{ github.event.issue.number }}
  cancel-in-progress: true

permissions:
  contents: read    # actions/checkout 需要读取仓库内容
  issues: write     # 创建评论、关闭 Issue、修改标签
  packages: write   # 推送到 GHCR 时需要

jobs:
  sync-image:
    # 仅处理新增标签为 image-sync 的事件
    if: github.event.label.name == 'image-sync'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ============================================
      # 步骤0：检出仓库代码
      # ============================================
      - name: 📥 检出仓库代码
        uses: actions/checkout@v4

      # ============================================
      # 步骤1：解析 Issue 内容
      # ============================================
      - name: 📝 解析 Issue 内容
        id: parse-issue
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          echo "=========================================="
          echo "📝 解析 Issue 内容"
          echo "=========================================="

          # 从 Issue body 中提取完整的镜像地址
          FULL_REF=$(echo "${ISSUE_BODY}" | \
            sed -n '/### 镜像完整地址/,/###/p' | \
            grep -v '###' | \
            sed '/^$/d' | \
            head -n1 | \
            xargs)

          echo "原始输入: ${FULL_REF}"

          # 解析完整镜像地址：registry/image/path:tag
          # 示例：docker.io/apache/seatunnel:2.3.13

          PARSE_ERROR="false"

          if [ -z "${FULL_REF}" ]; then
            echo "❌ 无法从 Issue 中解析出镜像地址"
            PARSE_ERROR="true"
          else
            # 1. 提取 Tag（最后一个冒号后的内容）
            if echo "${FULL_REF}" | grep -q ':'; then
              IMAGE_TAG=$(echo "${FULL_REF}" | rev | cut -d':' -f1 | rev)
              IMAGE_REF_NO_TAG=$(echo "${FULL_REF}" | sed 's/:[^:]*$//')
            else
              IMAGE_TAG="latest"
              IMAGE_REF_NO_TAG="${FULL_REF}"
            fi

            # 2. 提取 Registry 和 Image Name（按第一个 / 分割）
            if echo "${IMAGE_REF_NO_TAG}" | grep -q '/'; then
              SOURCE_REGISTRY=$(echo "${IMAGE_REF_NO_TAG}" | cut -d'/' -f1)
              IMAGE_NAME=$(echo "${IMAGE_REF_NO_TAG}" | cut -d'/' -f2-)
            else
              # 用户只填写了镜像名，没有仓库地址
              SOURCE_REGISTRY="docker.io"
              IMAGE_NAME="${IMAGE_REF_NO_TAG}"
            fi

            # 3. 校验必须包含仓库地址
            if ! echo "${SOURCE_REGISTRY}" | grep -qE '\.|:|localhost'; then
              echo "❌ 镜像地址不完整，缺少仓库地址。请填写如 docker.io/apache/seatunnel:2.3.13 的完整地址"
              PARSE_ERROR="true"
            fi
          fi

          echo "解析结果:"
          echo "  镜像名称: ${IMAGE_NAME:-未解析}"
          echo "  镜像Tag: ${IMAGE_TAG:-未解析}"
          echo "  源仓库: ${SOURCE_REGISTRY:-未解析}"

          # 输出到 GitHub Actions 环境变量
          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "source_registry=${SOURCE_REGISTRY}" >> "$GITHUB_OUTPUT"
          echo "parse_error=${PARSE_ERROR}" >> "$GITHUB_OUTPUT"

          if [ "${PARSE_ERROR}" = "true" ]; then
            echo "❌ 镜像地址解析失败，将在下一步向 Issue 反馈"
          fi

      # ============================================
      # 步骤2：检查仓库配置
      # ============================================
      - name: 🔍 检查目标镜像仓库配置
        id: check-config
        run: |
          echo "=========================================="
          echo "🔍 检查目标镜像仓库配置"
          echo "=========================================="

          REGISTRY_URL="${REGISTRY_URL:-}"
          REGISTRY_NAMESPACE="${REGISTRY_NAMESPACE:-}"
          REGISTRY_USERNAME="${REGISTRY_USERNAME:-}"
          HAS_REGISTRY_PASSWORD="${HAS_REGISTRY_PASSWORD:-false}"

          echo "配置检查结果:"
          echo "  REGISTRY_URL: ${REGISTRY_URL}"
          echo "  REGISTRY_NAMESPACE: ${REGISTRY_NAMESPACE}"
          echo "  REGISTRY_USERNAME: 已配置=${REGISTRY_USERNAME:+是}"
          echo "  REGISTRY_PASSWORD: 已配置=${HAS_REGISTRY_PASSWORD}"

          CONFIG_OK="true"
          MISSING_CONFIG=""

          if [ -z "${REGISTRY_URL}" ]; then
            CONFIG_OK="false"
            MISSING_CONFIG="${MISSING_CONFIG} REGISTRY_URL"
          fi

          if [ -z "${REGISTRY_NAMESPACE}" ]; then
            CONFIG_OK="false"
            MISSING_CONFIG="${MISSING_CONFIG} REGISTRY_NAMESPACE"
          fi

          if [ -z "${REGISTRY_USERNAME}" ]; then
            CONFIG_OK="false"
            MISSING_CONFIG="${MISSING_CONFIG} REGISTRY_USERNAME"
          fi

          if [ "${HAS_REGISTRY_PASSWORD}" != "true" ]; then
            CONFIG_OK="false"
            MISSING_CONFIG="${MISSING_CONFIG} REGISTRY_PASSWORD"
          fi

          echo "config_ok=${CONFIG_OK}" >> "$GITHUB_OUTPUT"
          echo "registry_url=${REGISTRY_URL}" >> "$GITHUB_OUTPUT"
          echo "registry_namespace=${REGISTRY_NAMESPACE}" >> "$GITHUB_OUTPUT"
          echo "missing_config=${MISSING_CONFIG}" >> "$GITHUB_OUTPUT"

          if [ "${CONFIG_OK}" = "true" ]; then
            echo "✅ 仓库配置完整"
            echo "  目标仓库: ${REGISTRY_URL}"
            echo "  目标命名空间: ${REGISTRY_NAMESPACE}"
          else
            echo "❌ 仓库配置不完整，缺少: ${MISSING_CONFIG}"
          fi
        env:
          REGISTRY_URL: ${{ vars.REGISTRY_URL }}
          REGISTRY_NAMESPACE: ${{ vars.REGISTRY_NAMESPACE }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          HAS_REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD != '' }}

      # ============================================
      # 步骤3：配置不完整时评论并关闭 Issue
      # ============================================
      - name: 💬 配置不完整 - 评论反馈
        if: steps.check-config.outputs.config_ok != 'true' || steps.parse-issue.outputs.parse_error == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const parseError = '${{ steps.parse-issue.outputs.parse_error }}';
            const configOk = '${{ steps.check-config.outputs.config_ok }}';
            const missingConfig = '${{ steps.check-config.outputs.missing_config }}';

            let commentBody = '';

            if (parseError === 'true') {
              commentBody = `## ❌ 无法解析镜像地址\n\n` +
                `无法从 Issue 中解析出有效的完整镜像地址。\n\n` +
                `### 请使用以下格式填写\n\n` +
                `\`\`\`\n` +
                `docker.io/apache/seatunnel:2.3.13\n` +
                `docker.io/library/mysql:8.4.10\n` +
                `docker.io/nginxinc/nginx:latest\n` +
                `quay.io/prometheus/node-exporter:latest\n` +
                `ghcr.io/owner/repo:tag\n` +
                `\`\`\`\n\n` +
                `注意：必须包含完整的仓库地址（如 \`docker.io/\`），不能只写镜像路径。\n\n` +
                `---\n*由 [image-sync](https://github.com/${context.repo.owner}/${context.repo.repo}) Action 自动反馈*`;
            } else if (configOk !== 'true') {
              commentBody = `## ❌ 未配置目标容器镜像仓库\n\n` +
                `当前仓库未完整配置目标容器镜像仓库，无法同步镜像。\n\n` +
                `### 缺少的配置项\n\n` +
                missingConfig.split(' ').filter(s => s).map(item => `- \`${item}\``).join('\n') + '\n\n' +
                `### 配置方法\n\n` +
                `请在本 GitHub 仓库中配置以下 Variables 和 Secrets：\n\n` +
                `| 配置项 | 类型 | 说明 |\n` +
                `|--------|------|------|\n` +
                `| \`REGISTRY_URL\` | Variable | 目标仓库地址（如 \`ccr.ccs.tencentyun.com\`、\`docker.io\`） |\n` +
                `| \`REGISTRY_NAMESPACE\` | Variable | 目标命名空间（如 \`ruichuangdev\`） |\n` +
                `| \`REGISTRY_USERNAME\` | Secret | 仓库用户名 |\n` +
                `| \`REGISTRY_PASSWORD\` | Secret | 仓库密码或访问Token |\n\n` +
                `配置路径：仓库 Settings → Secrets and variables → Actions\n\n` +
                `---\n*由 [image-sync](https://github.com/${context.repo.owner}/${context.repo.repo}) Action 自动反馈*`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              labels: ['image-sync-failed']
            });

      # ============================================
      # 步骤4：安装 skopeo（下载最新版 binary）
      # ============================================
      - name: 📦 安装 skopeo
        if: steps.check-config.outputs.config_ok == 'true' && steps.parse-issue.outputs.parse_error != 'true'
        run: |
          echo "📦 下载最新版 skopeo binary..."
          SKOPEO_VERSION="v1.23.0"
          curl -sL "https://github.com/lework/skopeo-binary/releases/download/${SKOPEO_VERSION}/skopeo-linux-amd64" -o /usr/local/bin/skopeo
          chmod +x /usr/local/bin/skopeo
          echo "✅ skopeo 安装完成"
          skopeo --version

          # 新版 skopeo 要求 v2 格式的 registries.conf
          # ubuntu runner 默认是 v1 格式，需要创建兼容的 v2 配置
          echo "📦 创建 v2 格式 registries.conf..."
          sudo mkdir -p /etc/containers
          echo 'unqualified-search-registries = ["docker.io"]' | sudo tee /etc/containers/registries.conf
          echo "✅ registries.conf 配置完成"

      # ============================================
      # 步骤5：同步镜像
      # ============================================
      - name: 🔄 同步容器镜像
        id: sync
        if: steps.check-config.outputs.config_ok == 'true' && steps.parse-issue.outputs.parse_error != 'true'
        run: |
          echo "🚀 开始同步镜像..."

          chmod +x scripts/sync-image.sh

          # 运行同步脚本（直接输出到日志，实时可见）
          # 关键信息会写入 /tmp/image-sync-result.env，脚本结束后提取
          bash scripts/sync-image.sh \
            "${{ steps.parse-issue.outputs.image_name }}" \
            "${{ steps.parse-issue.outputs.image_tag }}" \
            "${{ steps.parse-issue.outputs.source_registry }}" \
            "${{ steps.check-config.outputs.registry_url }}" \
            "${{ steps.check-config.outputs.registry_namespace }}" \
            "${{ secrets.REGISTRY_USERNAME }}" \
            "${{ secrets.REGISTRY_PASSWORD }}" \
            "amd64 arm64" || true

          # 从结果文件提取关键信息
          RESULT_FILE="/tmp/image-sync-result.env"
          if [ -f "${RESULT_FILE}" ]; then
            SYNC_STATUS=$(grep "^SYNC_STATUS=" "${RESULT_FILE}" | cut -d= -f2 || echo "unknown")
            SOURCE_IMAGE=$(grep "^SOURCE_IMAGE=" "${RESULT_FILE}" | cut -d= -f2 || echo "")
            TARGET_IMAGE=$(grep "^TARGET_IMAGE=" "${RESULT_FILE}" | cut -d= -f2 || echo "")
            AVAILABLE_ARCHS=$(grep "^AVAILABLE_ARCHS=" "${RESULT_FILE}" | cut -d= -f2 || echo "")
            TARGET_ARCHS=$(grep "^TARGET_ARCHS=" "${RESULT_FILE}" | cut -d= -f2 || echo "")
            ERROR_TYPE=$(grep "^ERROR_TYPE=" "${RESULT_FILE}" | cut -d= -f2 || echo "")
            ERROR_DETAIL=$(grep "^ERROR_DETAIL=" "${RESULT_FILE}" | cut -d= -f2- || echo "")
          else
            SYNC_STATUS="unknown"
            SOURCE_IMAGE=""
            TARGET_IMAGE=""
            AVAILABLE_ARCHS=""
            TARGET_ARCHS=""
            ERROR_TYPE=""
            ERROR_DETAIL=""
          fi

          echo "sync_status=${SYNC_STATUS}" >> "$GITHUB_OUTPUT"
          echo "source_image=${SOURCE_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "target_image=${TARGET_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "available_archs=${AVAILABLE_ARCHS}" >> "$GITHUB_OUTPUT"
          echo "target_archs=${TARGET_ARCHS}" >> "$GITHUB_OUTPUT"
          echo "error_type=${ERROR_TYPE}" >> "$GITHUB_OUTPUT"
          echo "error_detail=${ERROR_DETAIL}" >> "$GITHUB_OUTPUT"

      # ============================================
      # 步骤6：评论反馈同步结果
      # ============================================
      - name: 💬 同步成功 - 评论反馈
        if: steps.sync.outputs.sync_status == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const sourceImage = '${{ steps.sync.outputs.source_image }}';
            const targetImage = '${{ steps.sync.outputs.target_image }}';
            const targetArchs = '${{ steps.sync.outputs.target_archs }}';
            const registryUrl = '${{ steps.check-config.outputs.registry_url }}';
            const registryNamespace = '${{ steps.check-config.outputs.registry_namespace }}';

            let archsDisplay = '';
            if (targetArchs && targetArchs !== 'unknown') {
              const archs = targetArchs.split(' ');
              archsDisplay = archs.map(a => {
                if (a === 'amd64') return `✅ amd64 (x86_64)`;
                if (a === 'arm64') return `✅ arm64 (aarch64)`;
                return `✅ ${a}`;
              }).join('\n');
            } else {
              archsDisplay = '✅ 多架构 manifest 已同步';
            }

            // 检查是否有缺失的架构
            let missingArchsInfo = '';
            const expectedArchs = ['amd64', 'arm64'];
            if (targetArchs && targetArchs !== 'unknown') {
              const syncedArchs = targetArchs.split(' ');
              const missing = expectedArchs.filter(a => !syncedArchs.includes(a));
              if (missing.length > 0) {
                missingArchsInfo = '\n\n### ⚠️ 未同步架构\n\n' +
                  missing.map(a => `❌ ${a}（源镜像不支持该架构）`).join('\n');
              }
            }

            const commentBody = `## ✅ 容器镜像同步成功\n\n` +
              `### 镜像信息\n\n` +
              `| 项目 | 值 |\n` +
              `|------|----|\n` +
              `| 原始镜像 | \`${sourceImage}\` |\n` +
              `| 同步后镜像 | \`${targetImage}\` |\n` +
              `| 目标仓库 | \`${registryUrl}\` |\n` +
              `| 目标命名空间 | \`${registryNamespace}\` |\n\n` +
              `### 已同步架构\n\n${archsDisplay}${missingArchsInfo}\n\n` +
              `### 使用方法\n\n` +
              `\`\`\`bash\n` +
              `docker pull ${targetImage}\n` +
              `\`\`\`\n\n` +
              `---\n*由 [image-sync](https://github.com/${context.repo.owner}/${context.repo.repo}) Action 自动反馈*`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              labels: ['image-sync-success']
            });

      # ============================================
      # 步骤7：同步失败 - 评论反馈
      # ============================================
      - name: 💬 同步失败 - 评论反馈
        if: steps.sync.outputs.sync_status != 'success' && steps.sync.outputs.sync_status != '' && steps.check-config.outputs.config_ok == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const sourceImage = '${{ steps.sync.outputs.source_image }}';
            const targetImage = '${{ steps.sync.outputs.target_image }}';
            const errorType = '${{ steps.sync.outputs.error_type }}';
            const errorDetail = '${{ steps.sync.outputs.error_detail }}';
            const registryUrl = '${{ steps.check-config.outputs.registry_url }}';

            // 根据 ERROR_TYPE 生成不同的错误说明和建议
            let errorTitle = '';
            let errorExplanation = '';
            let suggestions = '';

            if (errorType === 'login_failed') {
              errorTitle = '❌ 目标仓库登录失败';
              errorExplanation = `登录目标仓库 **${registryUrl}** 失败。`;
              suggestions =
                `1. 检查 **Secrets** 中 \`REGISTRY_USERNAME\` 是否正确（路径：Settings → Secrets and variables → Actions）\n` +
                `2. 检查 **Secrets** 中 \`REGISTRY_PASSWORD\` 是否正确\n` +
                `3. 在本地手动验证：\n` +
                `   \`\`\`bash\n` +
                `   docker login ${registryUrl}\n` +
                `   \`\`\``;
            } else if (errorType === 'source_image_not_found') {
              errorTitle = '❌ 源镜像不存在或无法访问';
              errorExplanation = `指定的源镜像 **${sourceImage}** 在源仓库中不存在，或为私有镜像需要认证。`;
              suggestions =
                `1. 确认镜像完整地址是否拼写正确（例如：\`docker.io/apache/seatunnel:2.3.13\`）\n` +
                `2. 如果源镜像为私有镜像，当前不支持私有源镜像同步\n` +
                `3. 在本地验证源镜像是否存在：\n` +
                `   \`\`\`bash\n` +
                `   skopeo inspect --raw docker://${sourceImage}\n` +
                `   \`\`\``;
            } else if (errorType === 'sync_failed') {
              errorTitle = '❌ 镜像同步失败';
              errorExplanation = `所有架构（amd64/arm64）同步均失败。`;
              suggestions =
                `1. 检查目标仓库 **${registryUrl}** 的命名空间是否已创建\n` +
                `2. 检查目标仓库的推送权限是否正确\n` +
                `3. 大镜像跨国同步可能超时（30分钟限制），请重试\n` +
                `4. 查看 Action 运行日志获取 skopeo 的完整输出`;
            } else if (errorType === 'partial_sync_failed') {
              errorTitle = '⚠️ 部分架构同步失败';
              errorExplanation = `部分架构同步失败，但至少有一个架构同步成功。`;
              suggestions =
                `1. 源镜像可能不支持所有请求的架构\n` +
                `2. 这是正常现象，不影响已成功架构的使用`;
            } else {
              errorTitle = '❌ 同步失败';
              errorExplanation = '同步过程中出现未知错误。';
              suggestions =
                `1. 请查看 Action 运行日志获取详细信息\n` +
                `2. 检查仓库配置是否正确`;
            }

            // 错误详情部分
            let errorDetailSection = '';
            if (errorDetail) {
              const displayDetail = errorDetail.length > 500
                ? '...' + errorDetail.substring(errorDetail.length - 500)
                : errorDetail;
              errorDetailSection = `\n\n### 🔍 错误详情\n\n\`\`\`\n${displayDetail}\n\`\`\``;
            }

            const commentBody = `## ${errorTitle}\n\n` +
              `### 镜像信息\n\n` +
              `| 项目 | 值 |\n` +
              `|------|----|\n` +
              `| 源镜像 | \`${sourceImage}\` |\n` +
              `| 目标仓库 | \`${registryUrl}\` |\n` +
              `| 目标镜像 | \`${targetImage || '未生成'}\` |\n\n` +
              `### 错误原因\n\n${errorExplanation}${errorDetailSection}\n\n` +
              `### 建议\n\n${suggestions}\n\n` +
              `---\n*由 [image-sync](https://github.com/${context.repo.owner}/${context.repo.repo}) Action 自动反馈*`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'open',
              labels: ['image-sync-failed']
            });
